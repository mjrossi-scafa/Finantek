<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="kBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0B3A"/>
      <stop offset="100%" stop-color="#0A0416"/>
    </linearGradient>
    <linearGradient id="kFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Fondo cuadrado con esquinas redondeadas -->
  <rect width="100" height="100" rx="22" fill="url(#kBg)"/>

  <!-- K gruesa y legible -->
  <!-- Palo vertical -->
  <rect x="22" y="22" width="14" height="56" rx="2" fill="url(#kFill)"/>
  <!-- Diagonal superior -->
  <path d="M 40 48 L 60 22 L 72 22 L 50 50 Z" fill="url(#kFill)"/>
  <!-- Diagonal inferior -->
  <path d="M 40 52 L 50 50 L 72 78 L 60 78 Z" fill="url(#kFill)"/>

  <!-- Punto verde característico con glow -->
  <circle cx="78" cy="78" r="10" fill="#84CC16" opacity="0.35" filter="url(#dotGlow)"/>
  <circle cx="78" cy="78" r="6" fill="#84CC16"/>
  <circle cx="76" cy="76" r="2" fill="#FFFFFF" opacity="0.85"/>
</svg>
